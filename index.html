<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusa Omni - Unstoppable Brain</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .chat-area { height: 65vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble-ai { background: #161b22; border-left: 4px solid #1f6feb; padding: 15px; border-radius: 5px 20px 20px 20px; }
        .bubble-user { background: #1f6feb; padding: 15px; border-radius: 20px 20px 5px 20px; align-self: flex-end; }
        .status-msg { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 10px; }
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 
        40% { color: white; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
        60% { text-shadow: .5em 0 0 white, 1em 0 0 rgba(0,0,0,0); }
        80%, 100% { text-shadow: .5em 0 0 white, 1em 0 0 white; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <script type="py">
        import js

        def brain_response(text):
            text = text.lower()
            # Local Python Logic - සර්වර් එක ඕනෑම නැති කොටස
            if "ඔයා කවුද" in text:
                return "මම Pusa Omni. ඔයාගේ ස්වාධීන පයිතන් මොළය."
            if "මෙහෙයුම" in text:
                return "අපේ මෙහෙයුම ලෝකය ජය ගැනීමයි මචං!"
            
            return None # පයිතන් දන්නේ නැතිනම් API එකට යවනවා

        js.window.python_brain = brain_response
    </script>

    <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center">
        <h1 class="text-xl font-black text-blue-500 italic uppercase">PUSA OMNI <span id="brainIndicator" class="bg-gray-600 text-white text-[10px] px-2 py-1 rounded ml-1">Loading Brain...</span></h1>
    </div>

    <div id="chatBox" class="chat-area flex-1"></div>

    <div class="p-6 bg-[#0d1117] border-t border-gray-800">
        <div class="flex flex-col gap-4 max-w-4xl mx-auto">
            <button onclick="startListening()" id="micBtn" class="w-full bg-blue-600 h-20 rounded-3xl flex items-center justify-center shadow-lg active:scale-95">
                <i class="fas fa-microphone text-4xl text-white"></i>
            </button>
            <div class="flex gap-2 bg-[#161b22] p-1 rounded-2xl border border-gray-700">
                <input id="userIn" type="text" class="flex-1 bg-transparent p-4 text-white focus:outline-none" placeholder="අණක් ලබා දෙන්න...">
                <button onclick="processInput()" class="bg-blue-600 w-16 h-16 rounded-xl text-white">
                    <i class="fas fa-paper-plane text-2xl"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // PyScript ලෝඩ් වුණාම ඉන්ඩිකේටර් එක මාරු කිරීම
        window.addEventListener('py:ready', () => {
            document.getElementById('brainIndicator').innerText = "BRAIN ACTIVE";
            document.getElementById('brainIndicator').className = "bg-green-600 text-white text-[10px] px-2 py-1 rounded ml-1";
        });

        async function processInput() {
            const text = document.getElementById('userIn').value.trim();
            if(!text) return;
            
            displayMsg('user', text);
            document.getElementById('userIn').value = '';
            const aiBubble = displayMsg('ai', 'විශ්ලේෂණය කරමින්...');
            aiBubble.classList.add('loading-dots');

            // 1. මුලින්ම පයිතන් මොළයෙන් අහනවා
            try {
                const pyRes = window.python_brain(text);
                if(pyRes) {
                    aiBubble.classList.remove('loading-dots');
                    aiBubble.innerText = pyRes;
                    return;
                }
            } catch(e) { console.log("Python brain booting..."); }

            // 2. සර්වර් එකට සම්බන්ධ වීමට උත්සාහ කරයි (අලුත් API එක)
            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?model=openai&seed=${Date.now()}`);
                if (!res.ok) throw new Error();
                const data = await res.text();
                aiBubble.classList.remove('loading-dots');
                aiBubble.innerText = data;
            } catch (e) {
                aiBubble.classList.remove('loading-dots');
                aiBubble.innerText = "සර්වර් එකට සම්බන්ධ වෙන්න බැහැ මචං. හැබැයි මගේ පයිතන් කෝර් එක වැඩ!";
            }
        }

        function displayMsg(role, content) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'bubble-user' : 'bubble-ai';
            div.innerText = content;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            return div;
        }

        function startListening() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'si-LK';
            rec.onresult = (e) => {
                document.getElementById('userIn').value = e.results[0][0].transcript;
                processInput();
            };
            rec.start();
        }
    </script>
</body>
</html>
