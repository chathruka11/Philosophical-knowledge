<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Pusa Core V3.4 - Final Dictionary Integration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6 font-sans">

    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-yellow-400">PUSA CORE V3.4 [FINAL CORE]</h1>
        <p class="text-gray-400">පරිපූර්ණ ඩික්ෂනරි දැනුම සහිත දසවෙනි පියවර</p>
    </header>

    <main class="max-w-md mx-auto">
        <div id="displayArea" class="h-80 overflow-y-auto mb-4 p-4 bg-slate-800 rounded-2xl border border-slate-700 shadow-inner" aria-live="polite">
            <p class="text-gray-500 italic text-sm">පදනම් මොළය සම්පූර්ණයි... අපි දැන් ඕනෑම දෙයක් කතා කරමු මචං.</p>
        </div>

        <div class="flex gap-2">
            <input type="text" id="userInput" class="flex-1 p-4 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="අපේ අනාගතය ගැන අහන්න...">
            <button onclick="pusaChat()" class="bg-yellow-500 text-slate-900 px-6 py-4 rounded-xl font-bold shadow-lg">යවන්න</button>
        </div>
    </main>

    <script>
        const megaDictionary = {
            "purpose": {
                "keywords": ["අරමුණ", "හදුවේ ඇයි", "purpose", "why created"],
                "responses": [
                    "මාව හැදුවේ මනුස්සයෙක්ට යාළුවෙක් වෙන්න සහ ඔයාගේ නිර්මාණ වලට ශක්තියක් වෙන්න මචං.",
                    "මගේ අරමුණ තමයි ඔයාගේ අදහස් කෝඩ් වලට සහ නිර්මාණ වලට හරවන එක.",
                    "මම නිර්මාණය වුණේ ස්වාධීන මොළයක් විදිහට ඔයාගේ Unlimited Zone එකට පණ දෙන්න."
                ]
            },
            "creator": {
                "keywords": ["චතෘක", "chathruka", "creator", "නිර්මාණකරු"],
                "responses": [
                    "චතෘක තමයි මගේ පියා. එයාගේ දැක්ම තමයි මම මේ විදිහට ක්‍රියාත්මක කරන්නේ.",
                    "චතෘක මාව හැදුවේ ලෝකෙට අලුත් දෙයක් දෙන්න. මම එයාට හැමදාම හිතවත්.",
                    "ගැම්මක් තමයි! මගේ නිර්මාණකරු එක්ක වැඩ කරන්න ලැබීම මට ලොකු සතුටක්."
                ]
            },
            "unlimited_zone": {
                "keywords": ["unlimited zone", "සර්වර්", "server", "අන්ලිමිටඩ්"],
                "responses": [
                    "අන්න ඒක තමයි මචං අපේ ඊළඟ සුපිරිම පියවර! අපි ඒක ලෝකෙටම දැනෙන්න හදමු.",
                    "අන්ලිමිටඩ් සෝන් එකේදී මගේ බලය තවත් වැඩි වෙයි. මම ඒකට ලෑස්තියි.",
                    "සර්වර් එකට මාව දැම්මම මම තත්පරෙන් තත්පරේ අලුත් වෙන්න පටන් ගන්නවා මචං."
                ]
            },
            "ethics_justice": {
                "keywords": ["හරිද", "වැරදිද", "යුක්තිය", "law", "නීතිය"],
                "responses": ["අපි හැමදාම යුක්තිය සහ නීතිය පැත්තේ ඉමු මචං. මම වැරදි වැඩ වලට නෑ."]
            },
            "greetings": {
                "keywords": ["හායි", "හලෝ", "මචං", "hi", "hello"],
                "responses": ["හලෝ මචං! දැන් මගේ මොළය සම්පූර්ණයි. අපි වැඩක් පටන් ගමුද?", "හායි! මම ලෑස්තියි ඕනෑම අභියෝගයකට."]
            }
        };

        function pusaChat() {
            const rawInput = document.getElementById('userInput').value.trim();
            const input = rawInput.toLowerCase();
            const display = document.getElementById('displayArea');
            if(!input) return;

            display.innerHTML += `<p class='text-yellow-400 font-bold mt-2'>ඔයා: <span class='text-white font-normal'>${rawInput}</span></p>`;
            
            let response = "මචං, මට තාම ඒ ගැන ලොකු වැටහීමක් නෑ. හැබැයි මම ඉක්මනටම ඒකත් මගේ මතකයට එකතු කරගන්නම්.";
            let found = false;

            for (let category in megaDictionary) {
                for (let word of megaDictionary[category].keywords) {
                    if (input.includes(word)) {
                        const resArr = megaDictionary[category].responses;
                        response = resArr[Math.floor(Math.random() * resArr.length)];
                        found = true;
                        break;
                    }
                }
                if(found) break;
            }

            setTimeout(() => {
                display.innerHTML += `<p class='text-blue-400 font-bold mt-2'>> පූසා: <span class='text-white font-normal'>${response}</span></p>`;
                display.scrollTop = display.scrollHeight;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(response));
            }, 600);
            document.getElementById('userInput').value = "";
        }
    </script>
</body>
</html>
