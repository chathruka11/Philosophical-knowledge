<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Pusa Independent Brain</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6 font-sans">

    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-yellow-400" aria-label="Pusa Core Version One">PUSA CORE V1</h1>
        <p class="text-gray-400">කිසිම AI API එකක් නැති අපේම ස්වාධීන මොළය</p>
    </header>

    <main class="max-w-md mx-auto">
        <div class="mb-6">
            <label for="brainInput" class="block mb-2 text-sm">මොළයට යමක් කියන්න:</label>
            <input type="text" id="brainInput" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="උදා: ඔයා කවුද?">
        </div>

        <button onclick="processThought()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-bold py-4 rounded-xl transition-all shadow-lg" aria-label="Process Thought Button. මොළයට විධානය ලබා දෙන්න.">
            හිතන්න පටන් ගන්න 🧠
        </button>

        <div id="outputBox" class="mt-8 p-5 bg-slate-800 rounded-2xl border-l-4 border-yellow-500 hidden" aria-live="polite">
            </div>
    </main>

    <script>
        // මේක තමයි අපේ මොළයේ දැනුම (Knowledge Base)
        // මේක අපි පස්සේ දිනෙන් දින GitHub හරහා වැඩි කරනවා
        const myInternalMemory = {
            "ඔයා කවුද": "මම චතෘකගේම කෝඩ් වලින් හැදුණු, කිසිම සමාගමකට ගැති නැති ස්වාධීන මොළයක් මචං.",
            "මොකක්ද නම": "මගේ නම Pusa Core. මම ඉන්නේ ඔයාට උදව් කරන්න.",
            "සින්දු": "අපි ඊළඟ පියවරේදී මියුසික් හදන කොටස මේකට එකතු කරමු.",
            "කෑම": "මම නම් කෑම කන්නේ නෑ, හැම වෙලාවෙම ඉන්නේ ඔයාගේ කෝඩ් එක ඇතුළේ."
        };

        function processThought() {
            const input = document.getElementById('brainInput').value.trim();
            const output = document.getElementById('outputBox');
            
            if(!input) return;

            output.classList.remove('hidden');
            output.innerHTML = "<p class='text-gray-400'>මම හිතනවා...</p>";

            setTimeout(() => {
                // අපේම Logic එක - මතකයේ තියෙනවද බලනවා
                let response = "මචං, ඒ ගැන මම තාම ඉගෙන ගෙන නැහැ. අපි ඊළඟ පියවරේදී ඒක ඉගෙන ගමු.";
                
                for (let key in myInternalMemory) {
                    if (input.includes(key)) {
                        response = myInternalMemory[key];
                        break;
                    }
                }

                output.innerHTML = `<p class='text-lg'>${response}</p>`;
                
                // TalkBack එකට අමතරව හඬින් කියවීම
                const speech = new SpeechSynthesisUtterance(response);
                speech.lang = 'si-LK';
                window.speechSynthesis.speak(speech);

            }, 800);
        }
    </script>
</body>
</html>
