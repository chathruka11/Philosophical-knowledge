<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusa Omni - Ultra Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .chat-area { height: 65vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .bubble-ai { background: #161b22; border: 1px solid #30363d; border-radius: 20px 20px 20px 5px; padding: 15px; max-width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.6); line-height: 1.6; }
        .bubble-user { background: #1f6feb; border-radius: 20px 20px 5px 20px; padding: 15px; max-width: 85%; align-self: flex-end; font-weight: 500; }
        .mic-btn-active { background: #f85149 !important; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(248, 81, 73, 0); } 100% { transform: scale(1); } }
        /* සජීවී අකුරු වැටෙන විට එන Cursor එක */
        .typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center shadow-md">
        <div>
            <h1 class="text-xl font-black text-blue-500 tracking-tighter">PUSA OMNI <span class="text-white text-xs bg-blue-600 px-1 rounded">ULTRA 3.0</span></h1>
            <p id="clock" class="text-[10px] text-gray-500 font-mono mt-1"></p>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            <span class="text-[10px] text-green-400 font-bold uppercase">Deep Reasoning Active</span>
        </div>
    </div>

    <div id="chatBox" class="chat-area flex-1 bg-[#010409]">
        <div class="bubble-ai">හලෝ මචං! මම දැන් ලෝකයේ ප්‍රබලම AI මාදිලි වලට සමාන මට්ටමකට අප්ඩේට් වුණා. මට පුළුවන් ඕනෑම සංකීර්ණ ප්‍රශ්නයකට හිතලා පිළිතුරු දෙන්න. අපි වැඩේ පටන් ගමුද?</div>
    </div>

    <div class="p-6 bg-[#0d1117] border-t border-gray-800 shadow-2xl">
        <div class="flex flex-col gap-4">
            
            <button onclick="startListening()" id="micBtn" class="w-full bg-blue-600 h-20 rounded-3xl flex items-center justify-center gap-4 transition active:scale-90 shadow-lg border-b-4 border-blue-800">
                <i class="fas fa-microphone text-3xl text-white"></i>
                <div class="text-left">
                    <p class="text-xs text-blue-200 font-bold uppercase">Voice Command</p>
                    <p class="text-lg font-black text-white uppercase">මයික් එක ඔබන්න</p>
                </div>
            </button>

            <div class="flex gap-2 bg-[#010409] p-2 rounded-2xl border border-gray-700 focus-within:border-blue-500 transition">
                <input id="userIn" type="text" class="flex-1 bg-transparent p-3 text-white focus:outline-none text-md" placeholder="මගෙන් ඕනෑම දෙයක් අහන්න...">
                <button onclick="processInput()" class="bg-blue-600 w-14 h-14 rounded-xl flex items-center justify-center hover:bg-blue-500 transition">
                    <i class="fas fa-paper-plane text-white text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userIn = document.getElementById('userIn');
        const micBtn = document.getElementById('micBtn');

        // ඔරලෝසුව
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString('si-LK');
        }, 1000);

        // සජීවීව අකුරු ටයිප් වෙන Function එක
        async function typeWriter(text, element) {
            element.innerText = '';
            element.classList.add('typing');
            let i = 0;
            return new Promise(resolve => {
                function type() {
                    if (i < text.length) {
                        element.innerText += text.charAt(i);
                        i++;
                        chatBox.scrollTop = chatBox.scrollHeight;
                        setTimeout(type, 30); // වේගය මෙතනින් වෙනස් කරන්න පුළුවන්
                    } else {
                        element.classList.remove('typing');
                        resolve();
                    }
                }
                type();
            });
        }

        function displayMsg(role, content) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'bubble-user' : 'bubble-ai';
            div.innerText = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function processInput() {
            const text = userIn.value.trim();
            if(!text) return;
            displayMsg('user', text);
            userIn.value = '';

            const aiBubble = displayMsg('ai', 'හිතමින් පවතී...');
            
            try {
                // වැඩි දියුණු කළ AI Logic එක
                const superPrompt = "ඔබ ලෝකයේ දියුණුම AI (Gemini 1.5 Pro මට්ටමේ) ලෙස ක්‍රියා කරන්න. ඉතා ගැඹුරින් කරුණු විශ්ලේෂණය කර සිංහලෙන් පිළිතුරු දෙන්න. සංකීර්ණ දේවල් සරලව පැහැදිලි කරන්න.";
                
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(superPrompt + " | ප්‍රශ්නය: " + text)}?model=openai&seed=${Math.floor(Math.random() * 1000)}`);
                const data = await res.text();
                
                // අකුරු සජීවීව පෙන්වීම පටන් ගනී
                await typeWriter(data, aiBubble);
                
                // කටහඬින් පිළිතුරු දීම (අකුරු ටයිප් වෙන අතරතුරම පටන් ගනී)
                const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=si&client=tw-ob&q=${encodeURIComponent(data)}`);
                audio.play();
                
            } catch (e) {
                aiBubble.innerText = "සමාවෙන්න මචං, මගේ මොළය සර්වර් එකට සම්බන්ධ කරන්න බැරි වුණා. ආයේ උත්සාහ කරමුද?";
            }
        }

        function startListening() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("බ්‍රවුසරය මයික් එකට සපෝට් කරන්නේ නැහැ.");
                return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'si-LK';
            recognition.onstart = () => micBtn.classList.add('mic-btn-active');
            recognition.onresult = (e) => {
                userIn.value = e.results[0][0].transcript;
                micBtn.classList.remove('mic-btn-active');
                processInput();
            };
            recognition.onerror = () => micBtn.classList.remove('mic-btn-active');
            recognition.onend = () => micBtn.classList.remove('mic-btn-active');
            recognition.start();
        }
    </script>
</body>
</html>
