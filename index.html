<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusa Omni - Fixed Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .sidebar { width: 280px; background: #0d1117; border-right: 1px solid #30363d; height: 100vh; transition: 0.3s; position: fixed; left: -280px; z-index: 100; }
        .sidebar.active { left: 0; }
        .chat-area { height: 70vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .bubble-ai { background: #161b22; border: 1px solid #30363d; border-radius: 20px 20px 20px 5px; padding: 15px; max-width: 90%; line-height: 1.6; }
        .bubble-user { background: #1f6feb; border-radius: 20px 20px 5px 20px; padding: 15px; max-width: 85%; align-self: flex-end; }
        .history-item { padding: 12px; border-bottom: 1px solid #21262d; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .history-item:hover { background: #1f6feb; }
        .typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex">

    <div id="sidebar" class="sidebar p-4 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <span class="font-bold text-blue-500 tracking-widest">CHATS</span>
            <button onclick="toggleSidebar()" class="text-white"><i class="fas fa-times text-xl"></i></button>
        </div>
        <button onclick="newChat()" class="w-full border border-gray-600 p-3 rounded-xl mb-4 hover:bg-gray-800 transition font-bold">+ NEW CHAT</button>
        <div id="historyList" class="overflow-y-auto flex-1"></div>
    </div>

    <div class="flex-1 flex flex-col h-screen transition-all ml-0">
        <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center">
            <button onclick="toggleSidebar()" class="text-blue-500 w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-800"><i class="fas fa-bars text-xl"></i></button>
            <div class="text-center">
                <h1 class="text-lg font-black text-blue-500 italic">PUSA OMNI <span class="text-white text-[10px] bg-red-600 px-1 rounded animate-pulse">FIXED</span></h1>
                <p id="clock" class="text-[9px] text-gray-500 font-mono"></p>
            </div>
            <div class="w-10"></div>
        </div>

        <div id="chatBox" class="chat-area flex-1 bg-[#010409]"></div>

        <div class="p-4 bg-[#0d1117] border-t border-gray-800 shadow-2xl">
            <div class="flex flex-col gap-3 max-w-4xl mx-auto">
                <button onclick="startListening()" id="micBtn" class="w-full bg-blue-600 h-20 rounded-3xl flex items-center justify-center transition shadow-lg active:scale-90 border-b-4 border-blue-800">
                    <i class="fas fa-microphone text-4xl text-white"></i>
                </button>
                
                <div class="flex gap-2 bg-[#161b22] p-1 rounded-2xl border border-gray-700 focus-within:border-blue-500">
                    <input id="userIn" type="text" class="flex-1 bg-transparent p-4 text-white focus:outline-none text-lg" placeholder="මගෙන් ඕනෑම දෙයක් අහන්න...">
                    <button onclick="processInput()" class="bg-blue-600 w-16 h-16 rounded-xl text-white flex items-center justify-center hover:bg-blue-500 transition active:scale-95">
                        <i class="fas fa-paper-plane text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentChatId = Date.now();
        let chatHistory = JSON.parse(localStorage.getItem('pusa_history')) || {};

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('si-LK');
        }
        setInterval(updateClock, 1000);

        function saveHistory() {
            localStorage.setItem('pusa_history', JSON.stringify(chatHistory));
            renderHistoryList();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if(confirm("මේ චැට් එක මකන්නද?")) {
                delete chatHistory[id];
                saveHistory();
                if(currentChatId == id) newChat();
            }
        }

        function renderHistoryList() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            Object.keys(chatHistory).sort().reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = 'history-item';
                const textSpan = document.createElement('span');
                textSpan.className = 'truncate pr-2';
                textSpan.innerText = chatHistory[id][0]?.text || "හිස් චැට් එකක්";
                const delBtn = document.createElement('button');
                delBtn.innerHTML = '<i class="fas fa-trash-alt text-red-500"></i>';
                delBtn.onclick = (e) => deleteChat(id, e);
                item.onclick = () => loadChat(id);
                item.appendChild(textSpan);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        function loadChat(id) {
            currentChatId = id;
            document.getElementById('chatBox').innerHTML = '';
            chatHistory[id].forEach(msg => displayMsg(msg.role, msg.text, false));
            toggleSidebar();
        }

        function newChat() {
            currentChatId = Date.now();
            document.getElementById('chatBox').innerHTML = '<div class="bubble-ai">අලුත් චැට් එකක් පටන් ගත්තා මචං. මම සූදානම්!</div>';
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }

        async function typeWriter(text, element) {
            element.innerText = '';
            element.classList.add('typing');
            for (let i = 0; i < text.length; i++) {
                element.innerText += text.charAt(i);
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
                await new Promise(r => setTimeout(r, 25));
            }
            element.classList.remove('typing');
        }

        function displayMsg(role, content, shouldSave = true) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'bubble-user' : 'bubble-ai';
            div.innerText = content;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            if (shouldSave) {
                if (!chatHistory[currentChatId]) chatHistory[currentChatId] = [];
                chatHistory[currentChatId].push({role, text: content});
                saveHistory();
            }
            return div;
        }

        async function processInput() {
            const text = document.getElementById('userIn').value.trim();
            if(!text) return;
            displayMsg('user', text);
            document.getElementById('userIn').value = '';
            const aiBubble = displayMsg('ai', 'සිතමින් පවතී...');
            
            try {
                // OpenAI මාදිලියට මාරු කිරීම (Error එක නැති කිරීමට)
                const sysPrompt = `ඔබ Pusa Omni. වර්තමාන කාලය: ${new Date().toString()}. ඉතා පැහැදිලි සිංහලෙන් පිළිතුරු දෙන්න.`;
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(sysPrompt + " | ප්‍රශ්නය: " + text)}?model=openai&seed=${Date.now()}`);
                
                if (!res.ok) throw new Error();
                const data = await res.text();
                
                await typeWriter(data, aiBubble);
                const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=si&client=tw-ob&q=${encodeURIComponent(data)}`);
                audio.play();
                
                chatHistory[currentChatId][chatHistory[currentChatId].length-1].text = data;
                saveHistory();
            } catch (e) {
                aiBubble.innerText = "මචං, මට උත්තරයක් ගන්න බැරි වුණා. ආයෙත් උත්සාහ කරමුද?";
            }
        }

        function startListening() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'si-LK';
            rec.onstart = () => document.getElementById('micBtn').classList.add('bg-red-600', 'animate-pulse');
            rec.onresult = (e) => {
                document.getElementById('userIn').value = e.results[0][0].transcript;
                processInput();
            };
            rec.onend = () => document.getElementById('micBtn').classList.remove('bg-red-600', 'animate-pulse');
            rec.start();
        }

        window.onload = () => {
            renderHistoryList();
            if(!chatHistory[currentChatId]) displayMsg('ai', 'මම සූදානම් මචං. ඕනෑම දෙයක් අහන්න!', false);
        };
    </script>
</body>
</html>
