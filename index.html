<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusa Omni - Stable Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.4; }
        .ai { background: #161b22; border: 1px solid #30363d; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: #1f6feb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .loader { width: 20px; height: 20px; border: 3px solid #30363d; border-top: 3px solid #1f6feb; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center">
        <h1 class="text-lg font-black text-blue-500 italic">PUSA OMNI <span class="text-[10px] text-green-500 ml-1">● FIXED & READY</span></h1>
        <div id="loading" class="loader"></div>
    </div>

    <div id="chatBox" class="chat-container">
        <div class="bubble ai">දැන් හරි මචං! අර "Invalid Value" එරර් එක මම අයින් කළා. දැන් ඕනෑම දෙයක් අහන්න.</div>
    </div>

    <div class="p-4 bg-[#0d1117] border-t border-gray-800">
        <div class="flex flex-col gap-3">
            <div class="flex gap-2">
                <button onclick="startListening()" id="micBtn" class="bg-gray-800 w-12 h-12 rounded-full flex items-center justify-center">
                    <i class="fas fa-microphone text-white"></i>
                </button>
                <input id="userIn" type="text" class="flex-1 bg-[#161b22] border border-gray-700 rounded-2xl px-4 text-white focus:outline-none" placeholder="අණක් ලබා දෙන්න...">
                <button onclick="processInput()" class="bg-blue-600 w-12 h-12 rounded-full flex items-center justify-center">
                    <i class="fas fa-paper-plane text-white text-sm"></i>
                </button>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="quickAction('image')" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full border border-gray-700 whitespace-nowrap">CREATE IMAGE</button>
                <button onclick="quickAction('music')" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full border border-gray-700 whitespace-nowrap">AI VOICE/SONG</button>
                <button onclick="quickAction('app')" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full border border-gray-700 whitespace-nowrap">CODE APP</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const loading = document.getElementById('loading');

        async function processInput() {
            const input = document.getElementById('userIn');
            const text = input.value.trim();
            if(!text) return;

            addMsg('user', text);
            input.value = '';
            loading.style.display = 'block';

            try {
                // FIXED: Seed එක 32-bit සීමාව ඇතුළේ තබා ගැනීම (Math.random)
                const safeSeed = Math.floor(Math.random() * 1000000);
                const url = `https://text.pollinations.ai/${encodeURIComponent(text)}?model=openai&seed=${safeSeed}`;
                
                const response = await fetch(url);
                const data = await response.text();
                
                loading.style.display = 'none';
                addMsg('ai', data);
            } catch (e) {
                loading.style.display = 'none';
                addMsg('ai', "සර්වර් එකට සම්බන්ධ වෙන්න බැරි වුණා. ආයේ ට්‍රයි කරමු.");
            }
        }

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function quickAction(type) {
            const input = document.getElementById('userIn');
            if(type === 'image') input.value = "Create a high quality image of ";
            if(type === 'music') input.value = "Write a song about ";
            if(type === 'app') input.value = "Create a full HTML code for ";
            input.focus();
        }

        function startListening() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'si-LK';
            rec.onstart = () => document.getElementById('micBtn').classList.add('text-red-500');
            rec.onresult = (e) => {
                document.getElementById('userIn').value = e.results[0][0].transcript;
                processInput();
            };
            rec.onend = () => document.getElementById('micBtn').classList.remove('text-red-500');
            rec.start();
        }
    </script>
</body>
</html>
