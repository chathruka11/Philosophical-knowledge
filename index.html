<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusa Omni - Ultra Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        .bubble { padding: 15px 20px; border-radius: 22px; max-width: 85%; font-size: 15px; line-height: 1.6; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .ai { background: #161b22; border: 1px solid #30363d; align-self: flex-start; border-bottom-left-radius: 4px; color: #d1d5db; }
        .user { background: linear-gradient(135deg, #1f6feb, #2ea043); color: white; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
        .loader { width: 24px; height: 24px; border: 3px solid #30363d; border-top: 3px solid #1f6feb; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Markdown rendering help */
        .ai b, .ai strong { color: #58a6ff; }
        .ai pre { background: #0d1117; padding: 10px; border-radius: 8px; margin-top: 10px; overflow-x: auto; border: 1px solid #30363d; }
    </style>
</head>
<body>

    <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center z-10 shadow-md">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full absolute top-0 animate-ping"></div>
            </div>
            <h1 class="text-xl font-black text-blue-500 italic tracking-tighter">PUSA OMNI <span class="text-[10px] bg-blue-900/50 px-2 py-0.5 rounded border border-blue-700/50 text-blue-200 ml-1">ULTRA v4.0</span></h1>
        </div>
        <div id="loading" class="loader"></div>
    </div>

    <div id="chatBox" class="chat-container">
        <div class="bubble ai">මචං, මම දැන් ඉන්නේ මගේ උපරිම මට්ටමේ (Ultra Mode). මම දැන් ඕනෑම දෙයක් ගැන ඉතා ගැඹුරින් හිතලා, හරියටම මගේ යාළුවෙක්ට වගේ උත්තර දෙන්න ලෑස්තියි. මොනවද අද දැනගන්න ඕනේ?</div>
    </div>

    <div class="p-4 bg-[#0d1117] border-t border-gray-800 shadow-2xl">
        <div class="max-w-4xl mx-auto">
            <div class="flex gap-3 items-end">
                <div class="flex-1 bg-[#161b22] border border-gray-700 rounded-2xl flex items-center px-4 focus-within:border-blue-500 transition-all">
                    <textarea id="userIn" rows="1" class="flex-1 bg-transparent py-3 text-white focus:outline-none resize-none overflow-hidden" placeholder="මගෙන් ඕනෑම දෙයක් අහන්න..." oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button onclick="startListening()" id="micBtn" class="ml-2 text-gray-400 hover:text-blue-500 transition-colors">
                        <i class="fas fa-microphone text-lg"></i>
                    </button>
                </div>
                <button onclick="processInput()" class="bg-blue-600 hover:bg-blue-500 w-12 h-12 rounded-xl text-white flex items-center justify-center shadow-lg active:scale-90 transition-all">
                    <i class="fas fa-paper-plane text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const loading = document.getElementById('loading');

        async function processInput() {
            const input = document.getElementById('userIn');
            const text = input.value.trim();
            if(!text) return;

            addMsg('user', text);
            input.value = '';
            input.style.height = 'auto';
            loading.style.display = 'block';

            // අති දියුණු System Prompt එක
            const advancedPrompt = `
            නම: Pusa Omni. 
            කාර්යය: ඔබ අති බුද්ධිමත්, තාර්කික සහ මිත්‍රශීලී AI සහායකයෙකි.
            උපදෙස්: 
            1. සැමවිටම 'මචං' වැනි සමීප වචන භාවිතා කරමින් සිංහලෙන් පිළිතුරු දෙන්න.
            2. පිළිතුර ලබා දීමට පෙර ප්‍රශ්නය හොඳින් විග්‍රහ කර, ඉතා නිවැරදි තොරතුරු පමණක් ලබා දෙන්න.
            3. කිසිම හේතුවක් මත JSON, reasoning_content, හෝ තාක්ෂණික කේත කොටස් පිළිතුරේ අවසානයට පෙන්වන්න එපා. 
            4. ඔබ අන්තර්ජාලය සමඟ සෘජුව සම්බන්ධ වී සිටින බැවින් නවතම තොරතුරු ලබා දෙන්න.
            5. පිළිතුරේ වැදගත් කරුණු තද අකුරින් (Bold) පෙන්වන්න.
            `;

            try {
                const safeSeed = Math.floor(Math.random() * 1000000);
                // GPT-4 මට්ටමේ මොළය සම්බන්ධ කිරීම
                const url = `https://text.pollinations.ai/${encodeURIComponent(advancedPrompt + " | User: " + text)}?model=openai&seed=${safeSeed}`;
                
                const response = await fetch(url);
                let rawData = await response.text();

                // Advanced Clean-up: JSON සහ අනවශ්‍ය Tags ඉවත් කිරීම
                let finalResponse = rawData;
                try {
                    const parsed = JSON.parse(rawData);
                    finalResponse = parsed.choices?.[0]?.message?.content || parsed.content || rawData;
                } catch(e) {}

                // වැරදි විදිහට එන 'reasoning_content' වැනි දේවල් අතින්ම අයින් කිරීම
                finalResponse = finalResponse.replace(/\{"reasoning_content".*?"content":/gs, '').replace(/\}?$/g, '').trim();

                loading.style.display = 'none';
                addMsg('ai', finalResponse);
            } catch (e) {
                loading.style.display = 'none';
                addMsg('ai', "මචං, පොඩි සර්වර් ප්‍රශ්නයක් ආවා. අපි තව පාරක් උත්සාහ කරමුද?");
            }
        }

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startListening() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'si-LK';
            rec.onstart = () => document.getElementById('micBtn').classList.add('text-red-500', 'animate-pulse');
            rec.onresult = (e) => {
                document.getElementById('userIn').value = e.results[0][0].transcript;
                processInput();
            };
            rec.onend = () => document.getElementById('micBtn').classList.remove('text-red-500', 'animate-pulse');
            rec.start();
        }
    </script>
</body>
</html>
