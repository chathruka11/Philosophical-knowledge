
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusa Omni - Real-Time Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .chat-area { height: 65vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .bubble-ai { background: #161b22; border: 1px solid #30363d; border-radius: 20px 20px 20px 5px; padding: 15px; max-width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.6); line-height: 1.6; position: relative; }
        .bubble-user { background: #1f6feb; border-radius: 20px 20px 5px 20px; padding: 15px; max-width: 85%; align-self: flex-end; font-weight: 500; }
        .mic-btn-active { background: #f85149 !important; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(248, 81, 73, 0); } 100% { transform: scale(1); } }
        .typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center shadow-md">
        <div>
            <h1 class="text-xl font-black text-blue-500 tracking-tighter italic">PUSA OMNI <span class="text-white text-xs bg-red-600 px-1 rounded animate-pulse">LIVE</span></h1>
            <p id="clock" class="text-[10px] text-gray-500 font-mono mt-1"></p>
        </div>
        <div class="text-right">
            <span id="status" class="text-[9px] text-green-400 font-bold uppercase block">Synchronized</span>
            <span class="text-[9px] text-gray-500 uppercase italic">Real-Time Context Active</span>
        </div>
    </div>

    <div id="chatBox" class="chat-area flex-1 bg-[#010409]">
        <div class="bubble-ai">මචං, මම දැන් සජීවීව ලෝකයත් එක්ක සම්බන්ධයි. ඊයේ වුණු දේවල්, අද තත්පරෙන් තත්පරේ වෙනස් වෙන දේවල් සහ හෙට ගැනත් අපිට කතා කරන්න පුළුවන්. මම ලෑස්තියි!</div>
    </div>

    <div class="p-6 bg-[#0d1117] border-t border-gray-800 shadow-2xl">
        <div class="flex flex-col gap-4">
            <button onclick="startListening()" id="micBtn" class="w-full bg-blue-600 h-20 rounded-3xl flex items-center justify-center gap-4 transition active:scale-95 shadow-lg border-b-4 border-blue-900">
                <i class="fas fa-microphone text-3xl text-white"></i>
                <div class="text-left">
                    <p class="text-[10px] text-blue-200 font-bold uppercase leading-none">Voice Protocol</p>
                    <p class="text-lg font-black text-white uppercase">මයික් එක ඔබන්න</p>
                </div>
            </button>

            <div class="flex gap-2 bg-[#010409] p-2 rounded-2xl border border-gray-700 focus-within:border-blue-500">
                <input id="userIn" type="text" class="flex-1 bg-transparent p-3 text-white focus:outline-none text-md" placeholder="ඕනෑම දෙයක් අහන්න...">
                <button onclick="processInput()" class="bg-blue-600 w-14 h-14 rounded-xl flex items-center justify-center">
                    <i class="fas fa-paper-plane text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userIn = document.getElementById('userIn');
        const micBtn = document.getElementById('micBtn');

        // පද්ධති වේලාව සහ දිනය සජීවීව යාවත්කාලීන කිරීම
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock').innerText = now.toLocaleString('si-LK', options);
        }
        setInterval(updateClock, 1000);

        async function typeWriter(text, element) {
            element.innerText = '';
            element.classList.add('typing');
            let i = 0;
            return new Promise(resolve => {
                function type() {
                    if (i < text.length) {
                        element.innerText += text.charAt(i);
                        i++;
                        chatBox.scrollTop = chatBox.scrollHeight;
                        setTimeout(type, 25);
                    } else {
                        element.classList.remove('typing');
                        resolve();
                    }
                }
                type();
            });
        }

        function displayMsg(role, content) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'bubble-user' : 'bubble-ai';
            div.innerText = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function processInput() {
            const text = userIn.value.trim();
            if(!text) return;
            displayMsg('user', text);
            userIn.value = '';

            const aiBubble = displayMsg('ai', 'ලෝක දත්ත විශ්ලේෂණය කරමින්...');
            
            try {
                const now = new Date();
                // AI එකට වර්තමාන කාලය සහ සජීවී බව තේරුම් කර දෙන 'Super Prompt' එක
                const systemContext = `වර්තමාන දිනය සහ වේලාව: ${now.toString()}. ඔබ "Pusa Omni" නම් අතිශය දියුණු AI එකකි. ඔබට ඊයේ, අද සහ හෙට ගැන ගැඹුරු අවබෝධයක් ඇත. සෑම තත්පරයකම සිදුවන ලෝක සිදුවීම් ගැන සජීවීව සිතා පිළිතුරු දෙන්න. සැමවිටම සිංහලෙන් පිළිතුරු දෙන්න.`;
                
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(systemContext + " | පරිශීලක: " + text)}?model=searchgpt&seed=${Date.now()}`);
                const data = await res.text();
                
                await typeWriter(data, aiBubble);
                
                const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=si&client=tw-ob&q=${encodeURIComponent(data)}`);
                audio.play();
                
            } catch (e) {
                aiBubble.innerText = "සර්වර් සම්බන්ධතාවය බිඳ වැටුණා. කරුණාකර නැවත උත්සාහ කරන්න.";
            }
        }

        function startListening() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("මයික් එක ක්‍රියා නොකරයි."); return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'si-LK';
            recognition.onstart = () => micBtn.classList.add('mic-btn-active');
            recognition.onresult = (e) => {
                userIn.value = e.results[0][0].transcript;
                processInput();
            };
            recognition.onend = () => micBtn.classList.remove('mic-btn-active');
            recognition.start();
        }
    </script>
</body>
</html>
